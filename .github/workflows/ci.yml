name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install uv
        run: pip install uv

      - name: Install project
        run: uv pip install --system -e ".[dev]" pytest-cov

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src/nirspy

      - name: Pytest
        run: pytest --cov=nirspy --cov-report=xml --cov-report=term -m "not slow"

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  templates-smoke:
    name: Pipeline templates (integration)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-templates')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Cache MNE dataset
        uses: actions/cache@v4
        with:
          path: ~/mne_data
          key: mne-fnirs-motor-v1

      - name: Install uv
        run: pip install uv

      - name: Install project
        run: uv pip install --system -e ".[dev]"

      - name: Run template integration tests
        run: pytest tests/integration/ -v -m slow

  publish:
    name: Publish to PyPI
    needs: lint-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/nirspy/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
