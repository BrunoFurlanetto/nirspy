name: Feature request
description: Propose a new feature or enhancement
title: "[feat] "
labels: ["feature", "triage"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: High-level description of what should be added or changed.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why this one wins.

  - type: dropdown
    id: scope
    attributes:
      label: Affected layer
      multiple: true
      options:
        - domain
        - engine
        - blocks
        - io
        - gui
        - cli
        - docs
        - ci
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Papers, Best Practices fNIRS sections, MNE-NIRS issues, etc.
